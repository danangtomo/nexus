# This workflow has been consolidated into build.yml.
# build.yml handles both CI builds (on push to main) and releases (on tag push).
# This file is kept as a manual fallback only.

name: Release (manual fallback)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "Use build.yml for automated releases."
          echo "It triggers on tag push and handles all platforms."
          echo "Requested tag: ${{ github.event.inputs.tag }}"
