name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "NEXUS ${{ github.ref_name }}" \
            --notes "Release notes coming soon." \
            --draft=false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win -- --publish never
          - os: macos-latest
            build_cmd: npm run build:mac -- --publish never
          - os: ubuntu-latest
            build_cmd: npm run build:linux -- --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: ${{ matrix.build_cmd }}

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find out -maxdepth 1 -type f \( \
            -name "*.exe" -o -name "*.exe.blockmap" -o \
            -name "*.dmg" -o -name "*.dmg.blockmap" -o \
            -name "*.AppImage" -o -name "*.deb" -o \
            -name "latest*.yml" \
          \) | while IFS= read -r f; do
            echo "Uploading $f"
            gh release upload ${{ github.ref_name }} "$f" --clobber --repo ${{ github.repository }}
          done
