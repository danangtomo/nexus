name: Build & Release NEXUS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: # allows manual trigger from the Actions tab

# Needed to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false # don't cancel sibling jobs if one platform fails
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            eb_flag: --win
            py_cmd: python

          - name: macOS
            runner: macos-latest
            eb_flag: --mac
            py_cmd: python3

          - name: Linux
            runner: ubuntu-latest
            eb_flag: --linux
            py_cmd: python3

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # caches ~/.npm, keyed on package-lock.json

      # ── 3. Python  ───────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # ── 4. Linux deps ─────────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-latest'
        run: sudo apt-get update -y && sudo apt-get install -y fakeroot rpm ghostscript

      # ── 5. Ghostscript ────────────────────────────────────────────────────
      - name: Install Ghostscript (Windows)
        if: matrix.runner == 'windows-latest'
        run: choco install ghostscript --yes

      - name: Install Ghostscript (macOS)
        if: matrix.runner == 'macos-latest'
        run: brew install ghostscript

      # ── 6. Install JS deps ────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. Install Python deps ──────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -r python/requirements.txt
          pip install pyinstaller

      # ── 8. Build Python sidecar ───────────────────────────────────
      - name: Build BiRefNet sidecar
        run: |
          ${{ matrix.py_cmd }} python/build_sidecar_ci.py

      # ── 9. Debug ───────────────────────────────────────────
      - name: Debug python dist
        run: |
          dir python/dist || ls python/dist

      # ── 10. Bundle Ghostscript ────────────────────────────────────────────
      - name: Bundle Ghostscript
        run: node scripts/bundle-ghostscript.js

      # ── 11. Build renderer ───────────────────────────────────────────────
      - name: Build renderer
        run: npm run build

      # ── 12. Package ──────────────────────────────────────────────────────
      - name: Package app
        run: npx electron-builder ${{ matrix.eb_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 13. Upload artifacts ─────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-${{ matrix.name }}
          path: |
            out/*.exe
            out/*.dmg
            out/*.deb
            out/*.AppImage
          if-no-files-found: warn

      # ── 14. Publish release ──────────────────────────────────────────────
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.exe
            out/*.dmg
            out/*.deb
            out/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
