name: Build & Release NEXUS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            eb_flag: --win
            py_cmd: python

          - name: macOS
            runner: macos-latest
            eb_flag: --mac
            py_cmd: python3

          - name: Linux
            runner: ubuntu-latest
            eb_flag: --linux
            py_cmd: python3

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. System deps ────────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fakeroot rpm ghostscript libgl1 libglib2.0-0

      - name: Install Ghostscript (Windows)
        if: runner.os == 'Windows'
        run: choco install ghostscript --yes

      - name: Install Ghostscript (macOS)
        if: runner.os == 'macOS'
        run: brew install ghostscript

      # ── 5. JS dependencies ────────────────────────────────────────────────
      - name: Install JS dependencies
        run: npm ci

      # ── 6. BiRefNet sidecar ───────────────────────────────────────────────
      - name: Install BiRefNet Python dependencies
        run: pip install -r python/background-remover/requirements.txt pyinstaller

      - name: Download and quantize BiRefNet model
        run: ${{ matrix.py_cmd }} python/background-remover/download_models.py python/dist/models/birefnet

      - name: Build BiRefNet sidecar
        run: ${{ matrix.py_cmd }} python/background-remover/build_sidecar_ci.py

      # ── 7. OCR sidecar ────────────────────────────────────────────────────
      - name: Install CPU-only torch (prevents 2 GB CUDA download)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install OCR Python dependencies
        run: pip install -r python/ocr-reader/requirements.txt pyinstaller

      - name: Patch modelscope import in PaddleX
        run: ${{ matrix.py_cmd }} python/ocr-reader/patch_modelscope.py

      - name: Download MinerU models
        run: ${{ matrix.py_cmd }} python/ocr-reader/download_models.py python/dist/models/mineru

      - name: Build OCR sidecar
        run: ${{ matrix.py_cmd }} python/ocr-reader/build_sidecar_ci.py

      # ── 8. Ghostscript bundle ─────────────────────────────────────────────
      - name: Bundle Ghostscript
        run: node scripts/bundle-ghostscript.js

      # ── 9. Renderer build ─────────────────────────────────────────────────
      - name: Build renderer
        run: npm run build

      # ── 10. Verify sidecar outputs ────────────────────────────────────────
      - name: List python/dist contents
        shell: bash
        run: ls -lh python/dist/ 2>/dev/null || echo "(python/dist not found)"

      # ── 11. Package with electron-builder ─────────────────────────────────
      - name: Package app
        run: npx electron-builder ${{ matrix.eb_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Upload CI artifacts ───────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-${{ matrix.name }}
          path: |
            out/*.exe
            out/*.dmg
            out/*.deb
            out/*.AppImage
          if-no-files-found: warn

      # ── 13. Publish to GitHub Release (tags only) ─────────────────────────
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            out/*.exe
            out/*.exe.blockmap
            out/*.dmg
            out/*.dmg.blockmap
            out/*.AppImage
            out/*.deb
            out/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
