appId: com.nexus.app
productName: NEXUS
directories:
  output: out
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraResources:
  - from: node_modules/ffmpeg-static
    to: ffmpeg-static
    filter:
      - "**/*"
  - from: resources/ghostscript
    to: ghostscript
    filter:
      - "**/*"
win:
  target: nsis
  icon: build/icon.ico
  signingHashAlgorithms: []
  sign: null
mac:
  target: dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: danangtomo
  repo: nexus
