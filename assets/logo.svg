<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="160" height="160" rx="36" fill="#0d0d1a"/>

  <!-- Subtle glow behind N -->
  <ellipse cx="80" cy="80" rx="44" ry="44" fill="url(#glow)" opacity="0.18"/>

  <!-- N strokes -->
  <line x1="44" y1="108" x2="44"  y2="52"  stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="44" y1="52"  x2="116" y2="108" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="116" y1="108" x2="116" y2="52" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- Node dots — accent blue at every endpoint (the "nexus" points) -->
  <circle cx="44"  cy="52"  r="7" fill="#007AFF"/>
  <circle cx="116" cy="52"  r="7" fill="#007AFF"/>
  <circle cx="44"  cy="108" r="7" fill="#007AFF"/>
  <circle cx="116" cy="108" r="7" fill="#007AFF"/>

  <!-- Centre cross-point dot (where diagonal meets roughly center) -->
  <circle cx="80"  cy="80"  r="5" fill="#007AFF" opacity="0.6"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#007AFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
